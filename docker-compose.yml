version: '3.8'

services:
  # PostgreSQL Database
  # WARNING: Change POSTGRES_PASSWORD before any non-local deployment
  postgres:
    image: postgres:15-alpine
    container_name: agentic-ml-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}  # Override via env for production
      POSTGRES_DB: agentic_ml
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Celery
  # NOTE: For production, set a password via REDIS_PASSWORD env var
  redis:
    image: redis:7-alpine
    container_name: agentic-ml-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentic-ml-backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/agentic_ml
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=true
      - CORS_ORIGINS=["http://localhost:3000", "http://localhost:5173", "http://localhost:8001"]
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker
  # NOTE: By default this is disabled for local development (use local Celery worker instead)
  # To enable: docker compose --profile celery up
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentic-ml-celery
    command: celery -A app.core.celery_app worker --loglevel=info --pool=solo -Q celery
    profiles:
      - celery  # Only starts with --profile celery flag
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/agentic_ml
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentic-ml-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
